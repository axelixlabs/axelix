name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: 'Git release tag WITHOUT `v` prefix (e.g., 1.0.1)'
        required: true
        type: string

env:
  USERNAME: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_CONTAINER_REGISTRY: ghcr.io
  RELEASE_TAG: ${{ github.event.inputs.git_tag }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '25'

      - name: Build and Test
        run: ./gradlew clean build

  starter-compatibility-tests:
    name: ${{ matrix.starter }} on Java ${{ matrix.javaVersion }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - starter: Spring Boot 2 starter
            javaVersion: 11
            tasks: :sbs:axelix-spring-boot-2-starter:test
          - starter: Spring Boot 2 starter
            javaVersion: 14
            tasks: :sbs:axelix-spring-boot-2-starter:test
          - starter: Spring Boot 2 starter
            javaVersion: 17
            tasks: :sbs:axelix-spring-boot-2-starter:test
          - starter: Spring Boot 2 starter
            javaVersion: 21
            tasks: :sbs:axelix-spring-boot-2-starter:test
          - starter: Spring Boot 3 starter
            javaVersion: 17
            tasks: :sbs:axelix-spring-boot-3-starter:test :sbs:axelix-spring-boot-3-starter:concurrencyTest
          - starter: Spring Boot 3 starter
            javaVersion: 21
            tasks: :sbs:axelix-spring-boot-3-starter:test :sbs:axelix-spring-boot-3-starter:concurrencyTest
          - starter: Spring Boot 3 starter
            javaVersion: 24
            tasks: :sbs:axelix-spring-boot-3-starter:test :sbs:axelix-spring-boot-3-starter:concurrencyTest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up starter test JDK and Gradle JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: |
            ${{ matrix.javaVersion }}
            25

      - name: Run starter compatibility tests
        run: >-
          ./gradlew
          ${{ matrix.tasks }}
          -Paxelix.starter.tests.java.version=${{ matrix.javaVersion }}
          -Porg.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.javaVersion }}_X64,JAVA_HOME_25_X64

  security-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Running Security Check
        uses: ./.github/actions/security-check

  release-artifacts:
    needs: [build-and-test, starter-compatibility-tests, security-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VITE_APP_VERSION: ${{ github.event.inputs.git_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Loading Secrets
        uses: ./.github/actions/bitwarden
        with:
          bw-access-token: ${{ secrets.BW_ACCESS_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '25'

      # Intentionally leaving the setup-gradle action for release pipeline to not introduce any cached behavior
      # and to create the release build from scratch.
      - name: Build
        run: ./gradlew clean build sourcesJar javadocJar

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Build Docker Image
        run: docker build --tag ${{ env.GITHUB_CONTAINER_REGISTRY }}/${{ github.repository_owner }}/axelix:${{ env.RELEASE_TAG }} --file Dockerfile .

      # ====================================================================================
      # Artifacts Publication, after all builds, linters, tests, and Docker pushes succeed.
      # ====================================================================================
      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GITHUB_CONTAINER_REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker push to GitHub Container registry
        run: docker push ${{ env.GITHUB_CONTAINER_REGISTRY }}/${{ github.repository_owner }}/axelix:${{ env.RELEASE_TAG }}

      - name: Docker logout from GitHub Container Registry
        run: docker logout ${{ env.GITHUB_CONTAINER_REGISTRY }}

      - name: Publish to Maven Central
        run: ./gradlew publish
