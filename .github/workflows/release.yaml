name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: 'Git release tag without `v` prefix (e.g., 1.0.1, not v1.0.1)'
        required: true
        type: string

env:
  USERNAME: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_CONTAINER_REGISTRY: ghcr.io
  RELEASE_TAG: ${{ github.event.inputs.git_tag }}

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        java: [ 17, 21, 25 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: ${{ matrix.java }}

      - name: Build and Test
        run: ./gradlew clean build

  release-artifacts:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VITE_APP_VERSION: ${{ github.event.inputs.git_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Loading Secrets
        uses: ./.github/actions/bitwarden
        with:
          bw-access-token: ${{ secrets.BW_ACCESS_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '25'

      # Intentionally leaving the setup-gradle action for release pipeline to not introduce any cached behavior
      # and to create the release build from scratch.
      - name: Build
        run: ./gradlew clean build sourcesJar javadocJar

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Build Docker Image
        run: docker build --tag ${{ env.GITHUB_CONTAINER_REGISTRY }}/${{ github.repository_owner }}/axelix:${{ env.RELEASE_TAG }} --file Dockerfile .

      # ====================================================================================
      # Artifacts Publication, after all builds, linters, tests, and Docker pushes succeed.
      # ====================================================================================
      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GITHUB_CONTAINER_REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker push to GitHub Container registry
        run: docker push ${{ env.GITHUB_CONTAINER_REGISTRY }}/${{ github.repository_owner }}/axelix:${{ env.RELEASE_TAG }}

      - name: Docker logout from GitHub Container Registry
        run: docker logout ${{ env.GITHUB_CONTAINER_REGISTRY }}

      - name: Publish to Maven Central
        run: ./gradlew publish
