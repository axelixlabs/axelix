name: Backend Pull Requests

on:
  pull_request:
    paths:
      - 'master/**'
      - 'sbs/**'
      - 'common/**'
    branches: [ master ]

jobs:
  check-linked-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issues
        uses: nearform-actions/github-action-check-linked-issues@v1
        with:
          exclude-labels: "refactoring, dependencies"

  check-pr-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check PR size
        uses: ./.github/actions/check-pr-size
        with:
          max-lines: '1500'

  backend-build:
    needs: check-pr-size
    runs-on: ubuntu-latest
    env:
      NEXUS_USER: ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      NEXUS_URL: ${{ secrets.NEXUS_URL }}

      GRADLE_CACHE_ENCRYPTION_KEY: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Backend
        uses: ./.github/actions/build-backend
        with:
          gradle-cache-enryption-key: ${{ env.GRADLE_CACHE_ENCRYPTION_KEY }}
