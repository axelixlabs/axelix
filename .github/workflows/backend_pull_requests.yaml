name: Backend Pull Requests

on:
  pull_request:
    branches: [ master ]
    paths:
      # Backend modules
      - 'master/**'
      - '!master/front-end/**'
      - 'sbs/**'
      - 'common/**'

      # Playground projects
      - 'playgrounds/**'

      # Core Gradle build configuration
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'Makefile'

      # Code quality, formatting, and license configurations
      - 'pmd.ruleset.xml'
      - '.editorconfig'
      - 'LICENSE'
      - 'LICENSE_HEADER'

concurrency:
  # Unique ID of the concurrency group, which cancels an already running workflow for this PR (if any)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-pr-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check PR size
        uses: ./.github/actions/check-pr-size
        with:
          max-lines: '500'

  backend-build:
    runs-on: ubuntu-latest
    env:
      NEXUS_USER: ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      NEXUS_URL: ${{ secrets.NEXUS_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Java 25 will be installed at this step.
      - name: Build Backend
        uses: ./.github/actions/build-master
        with:
          gradle-cache-encryption-key: ''

      - name: Loading Secrets
        uses: ./.github/actions/bitwarden
        with:
          bw-access-token: ${{ secrets.BW_ACCESS_TOKEN }}

      # Starting build playground projects
      - name: Detect Changed Modules
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            sb2_specific:
              - 'sbs/axelix-spring-boot-2-starter/**'
              - 'playgrounds/spring-petclinic-maven-sb-2/**'
            
            sb3_specific:
              - 'sbs/axelix-spring-boot-3-starter/**'
              - 'playgrounds/feature-service-maven-sb-3/**'
            
            global_trigger:
              - 'common/**'
              - 'sbs/starter-domain/**'
              - 'buildSrc/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - '.github/workflows/**'
              - 'Makefile'
          
      - name: Run Conditional Playground Build via Make
        env:
          # Required variables for playground builds
          AXELIX_SBS_AUTH_JWT_ALGORITHM: HMAC512
          AXELIX_SBS_AUTH_JWT_SIGNING_KEY: ${{ env.SANDBOX_JWT_SIGNING_KEY }}
        run: |
          SHOULD_BUILD_SB2="false"
          if [ "${{ steps.filter.outputs.sb2_specific }}" = "true" ] || [ "${{ steps.filter.outputs.global_trigger }}" = "true" ]; then
            SHOULD_BUILD_SB2="true"
          fi
          
          SHOULD_BUILD_SB3="false"
          if [ "${{ steps.filter.outputs.sb3_specific }}" = "true" ] || [ "${{ steps.filter.outputs.global_trigger }}" = "true" ]; then
            SHOULD_BUILD_SB3="true"
          fi

          make build-playground BUILD_SB2="$SHOULD_BUILD_SB2"
          make build-playground BUILD_SB3="$SHOULD_BUILD_SB3"
