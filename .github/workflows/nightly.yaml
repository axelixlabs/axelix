name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-concurrency-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '25'

      - name: Run Concurrency Tests
        run: ./gradlew \
          clean \
          :sbs:axelix-spring-boot-3:concurrencyTest \
          :sbs:starter-domain \
          --no-build-cache \
          --no-configuration-cache
