name: Frontend Pull Requests

on:
  pull_request:
    paths:
      - 'front-end/**'
    branches: [ master ]

jobs:
  check-linked-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issues
        uses: nearform-actions/github-action-check-linked-issues@v1
        with:
          exclude-labels: "refactoring, dependencies"

  check-pr-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check PR size
        uses: ./.github/actions/check-pr-size
        with:
          max-lines: '400'

  frontend-build:
    needs: check-pr-size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Frontend
        uses: ./.github/actions/build-frontend
