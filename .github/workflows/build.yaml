name: Build / Deploy Axelix

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '!docs/**'
      - '!infra/**'
      - '!.editorconfig'
      - '!.gitignore'
      - 'LICENSE'
      - 'LICENSE_HEADER'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'
      - 'infra/**'
      - '.editorconfig'
      - '.gitignore'
      - 'LICENSE'
      - 'LICENSE_HEADER'

env:
  SHOULD_DEPLOY: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' }}
  DOCKER_CR_OAUTH_TOKEN: ${{ secrets.DOCKER_CR_OAUTH_TOKEN }}
  CR_URL: ${{ vars.CR_URL }}
  CR_MASTER_REPOSITORY: ${{ vars.CR_MASTER_REPOSITORY }}
  MASTER_BACKEND_IMAGE: ${{ vars.CR_URL }}/${{ vars.CR_MASTER_REPOSITORY }}/master
  MASTER_FRONTEND_IMAGE: ${{ vars.CR_URL }}/${{ vars.CR_MASTER_REPOSITORY }}/master-fe
  IMAGE_TAG: 1.0.0-SNAPSHOT


jobs:
  check-linked-issues:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'master' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issues
        uses: nearform-actions/github-action-check-linked-issues@v1
        with:
          exclude-labels: "refactoring"

  build-backends:
    name: Building Axelix Master backend along with Spring Boot Starters
    runs-on: ubuntu-latest
    env:
      # These are needed in order to publish the final build artifacts into Nexus package registry
      NEXUS_USER: ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      NEXUS_HOST_PORT: ${{ secrets.NEXUS_HOST_PORT }}
      STORE_PASS: ${{ secrets.STORE_PASS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TODO: Java 25 migrate
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Configuration Cache in encrypted with this key
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          # See https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#using-the-cache-read-only
          cache-read-only: false

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      # TODO: We probably would want here to not use build-cache for releases of production artifacts
      - name: Gradle build
        run: ./gradlew build --configuration-cache --build-cache

      - name: Download and trust Nexus SSL certificate for Gradle
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: |
          TRUSTSTORE="$JAVA_HOME/lib/security/cacerts"
          openssl s_client -connect $NEXUS_HOST_PORT -showcerts </dev/null 2>/dev/null | openssl x509 -outform PEM > nexus.crt
          sudo keytool -importcert -file nexus.crt -alias nexus-ssl -keystore $TRUSTSTORE -storepass $STORE_PASS -noprompt
          
          echo "org.gradle.jvmargs=-Djavax.net.ssl.trustStore=$TRUSTSTORE -Djavax.net.ssl.trustStorePassword=$STORE_PASS" >> $HOME/.gradle/gradle.properties

      - name: Publish Libraries to Nexus
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: ./gradlew publish

      - name: Set up Docker
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        uses: docker/setup-docker-action@v4

      - name: Build Docker Image
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        # TODO:
        #  1. extract version from gradle.properties file later on. For now hardcoded is fine
        #  2. And also we need to take the repository part inside the image name from the terraform output
        run: |
          docker build --tag $MASTER_BACKEND_IMAGE:$IMAGE_TAG --file master/docker/Dockerfile .

      - name: Docker login to Cloud Container Registry
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        # TODO: Is it possible to authenticate via service account? Cause currently here in the OAUTH_TOKEN is my token
        run: echo $DOCKER_CR_OAUTH_TOKEN | docker login --username oauth --password-stdin $CR_URL

      - name: Docker push to Cloud Container Registry
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: docker push $MASTER_BACKEND_IMAGE:$IMAGE_TAG

      - name: Docker logout
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: docker logout

  build-master-frontend:
    runs-on: ubuntu-latest
    name: Building React Front-End
    env:
      CR_FRONTEND_REPOSITORY: ${{ vars.CR_FRONTEND_REPOSITORY }}
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint application
        run: npm run lint

      - name: CSS lint application
        run: npm run lint-css

      - name: Run tests
        run: npm test

      - name: Set up Docker
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        uses: docker/setup-docker-action@v4

      - name: Build Docker Image
        # TODO:
        #  For now the version of package is hardcoded both in package.json and in here. We later would need to
        #  find a way to manage it correctly.
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: |
          docker build --tag $MASTER_FRONTEND_IMAGE:$IMAGE_TAG --file front-end/Dockerfile .

      - name: Docker login to Cloud Container Registry
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        # TODO: Is it possible to authenticate via service account? Cause currently here in the OAUTH_TOKEN is my token
        run: echo $DOCKER_CR_OAUTH_TOKEN | docker login --username oauth --password-stdin $CR_URL

      - name: Docker push to Cloud Container Registry
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: docker push $MASTER_FRONTEND_IMAGE:$IMAGE_TAG

      - name: Docker logout
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        run: docker logout

  deploy-k8s:
    needs:
      - build-master-frontend
      - build-backends
    if: |
      always() && 
      (needs.build-master-frontend.result == 'skipped' || needs.build-master-frontend.result == 'success') &&
      (needs.build-backends.result == 'skipped' || needs.build-backends.result == 'success')
    name: Deploy Axelix Chart to Test K8S Cluster
    runs-on: ubuntu-latest
    env:
      KUBE_CONFIG_BASE64: ${{ secrets.KUBE_CONFIG_BASE64 }}
    steps:
      - name: Setup Helm
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.14.0

      - name: Deploy master to K8S
        if: ${{ env.SHOULD_DEPLOY == 'true' }}
        working-directory: distributions/chart
        run: |
          mkdir -p ~/.kube
          touch ~/.kube/config
          echo "$KUBE_CONFIG_BASE64" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config
          helm upgrade \ 
            --set backend.image.name=$MASTER_BACKEND_IMAGE \
            --set backend.image.tag=$IMAGE_TAG \
            --set frontend.image.name=$MASTER_FRONTEND_IMAGE \
            --set frontend.image.tag=$IMAGE_TAG \
            --install master . -f values.yaml 
