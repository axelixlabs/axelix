name: axelix
version: 1.0.0
description: APM project for axelix
dependencies:
  apm:
  # Custom
  - ./.agent_skills/backlog-refiner
  - ./.agent_skills/docs-writer
  - ./.agent_skills/external-contributor-issues
  - ./.agent_skills/housekeeper
  - ./.agent_skills/security-vulnerabilities-patcher
  - ./.agent_skills/test-reviewer
  # External
  - anthropics/skills/skills/skill-creator
  mcp:
  - name: github
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-github'
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PAT}"
includes: auto
scripts: {}
