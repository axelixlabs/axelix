# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: "Focus on logic, bugs, and security."
early_access: true
enable_free_tier: true

reviews:
  profile: assertive
  poem: false
  changed_files_summary: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: ["master"]
  finishing_touches:
    docstrings:
      enabled: false
  path_instructions:
    - path: "sbs/starter-domain/**"
      instructions: Apply `.claude/skills/starter-domain-reviewer/SKILL.md`.
    - path: "**/src/test/**,**/*.test.ts,**/*.test.tsx"
      instructions: Apply `.claude/skills/test-reviewer/SKILL.md`.

issue_enrichment:
  auto_enrich:
    enabled: true
  labeling:
    auto_apply_labels: false
    labeling_instructions:
      - label: duplicate
        instructions: >
          Use this label when you think that semantically there is an already existing issue, that aims to bring up the same problem, bug, or feature suggestion.
