# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: "Focus on logic, bugs, and security."
early_access: true
enable_free_tier: true
reviews:
  profile: assertive
  poem: false
  changed_files_summary: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: ["master"]
  finishing_touches:
    docstrings:
      enabled: false
  path_instructions:
    - path: "**/src/test/**,**/*.test.ts,**/*.test.tsx"
      instructions: Apply `.claude/skills/test-reviewer/SKILL.md`.
