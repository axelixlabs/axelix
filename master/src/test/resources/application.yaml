spring:
  application:
    name: axelix
  config:
    import: "classpath:tokens.yml"
  datasource:
    # So, a couple of things here:
    # 1. This JDBC connection URL for SQLite still uses the in-memory db (see mode=memory) despite having 'file:memdb'.
    # This is intentional since we do not want the tests to produce any persistent artifacts.
    # 2. Typically, in case of a RAM-backed db SQLite creates a brand new in-memory db per every connection. That is not
    # what we want since we re-use the connections from the Hikari CP even in tests. Although again. So, we use 'cache=shared'
    # in order to force all the connections to use the shared database.
    url: "jdbc:sqlite:file:memdb?mode=memory&cache=shared"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 3
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL; PRAGMA foreign_keys=ON; PRAGMA busy_timeout=5000;"
  sql:
    init:
      mode: always
      schema-locations: classpath:instances-schema.sql

logging:
  level:
    org:
      springframework:
        jdbc:
          core:
            JdbcTemplate: DEBUG

management:
  endpoint:
    health:
      enabled: true
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: [ "health" ]

axelix:
  config:
    auth:
      tables:
        user-table: users
        role-table: roles
        authority-table: authorities
        user-role-table: user_roles
        role-authority-table: role_authorities
        role-components-table: role_components
  master:
    web:
      static-resources:
        location: classpath:/spa-dist/
    auth:
      jwt:
        algorithm: "HMAC512"
        signing_key: "22573444698685aa77750b88ad6e99ef1f94a7a909bc7df63f7a80666208c201ab7a584e6e05e6c9d0aa94b723f843ff"
        lifespan: 3h
      cookie:
        name: auth_token
        secure: false
