# These are the default settings for Axelix Master for ANY distribution of Axelix.
server:
  port: 8080

spring:
  application:
    name: axelix
  ai:
    mcp:
      server:
        enabled: ${axelix.master.mcp-server.enabled}
        protocol: streamable
        name: "axelix-mcp-server"
        # Ant-like value placeholder is substituted by Gradle resources task
        version: "@project.version@"
        streamable-http:
          mcp-endpoint: "/api/mcp"
  datasource:
    url: ${axelix.master.database.url}
    username: ${axelix.master.database.username}
    password: ${axelix.master.database.password}

management:
  endpoint:
    health:
      enabled: true
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: [ "health" ]

# TODO: we need to think about the design of properties in general
axelix:
  master:
    mcp-server:
      enabled: true
    database:
      url: jdbc:sqlite:axelix.db
      username: ""
      password:
    discovery:
      self-registration:
        enabled: true
        eviction:
          heartbeat-timeout: 45s
          schedule: "0 * * * * *"
      auto:
        enabled: false
        broadcast:
          schedule: "0 * * * * *"
        kubernetes:
          kube-apiserver-url: https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}
          sa-token-path: /var/run/secrets/kubernetes.io/serviceaccount/token
          ca-cert-path: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          filters:
            namespaces: default
            # labels:
    auth:
      jwt:
        lifespan: 12h
      options:
        super-admin:
          credentials:
            username: admin
            password: admin
        local:
          enabled: false
        oauth2:
          enabled: false
          issuer-uri:
          base-url:
          client-id:
          client-secret:
          role-attribute-path:
          scopes: openid
      cookie:
        secure: false
