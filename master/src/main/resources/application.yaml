# These are the default settings for Axelix Master.
server:
  port: 8080

spring:
  application:
    name: axelix
  ai:
    mcp:
      server:
        protocol: streamable
        name: "axelix-mcp-server"
        streamable-http:
          mcp-endpoint: "/api/mcp"
  datasource:
    url: jdbc:sqlite:axelix.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL; PRAGMA foreign_keys=ON; PRAGMA busy_timeout=5000;"
  sql:
    init:
      mode: always
      schema-locations: classpath:instances-schema.sql

management:
  endpoint:
    health:
      enabled: true
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: [ "health" ]

# TODO: we need to think about the design of properties in general
axelix:
  master:
    discovery:
      auto: true
      platform: kubernetes
      kubernetes:
        kube-apiserver-url: https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}
        sa-token-path: /var/run/secrets/kubernetes.io/serviceaccount/token
        ca-cert-path: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        filters:
          namespaces: default
    auth:
      jwt:
        lifespan: 12h
      options:
        static-admin:
          enabled: true
          credentials:
            username: admin
            password: admin
      cookie:
        name: auth_token
        secure: false
