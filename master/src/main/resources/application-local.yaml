# These are the settings for the local launch of Axelix Master
axelix:
  master:
    web:
      static-resources:
        location: /application/dist/
    discovery:
      auto: true
      platform: kubernetes
      kubernetes:
        # Should be provided by the local-launch configuration
        kube-apiserver-url:
        # Should be set-up in local .env file or by any other means
        sa-token-path: ${SA_TOKEN_PATH:}
        ca-cert-path: ${CA_CERT_PATH:}
        filters:
          namespaces: default
    auth:
      jwt:
        algorithm: HMAC512
        lifespan: 12h
        # Random singing key for local development
        signing-key: 22573444698685aa77750b88ad6e99ef1f94a7a909bc7df63f7a80666208c201ab7a584e6e05e6c9d0aa94b723f843ff
      options:
        static-admin:
          enabled: true
          credentials:
            username: admin
            password: admin
      cookie:
        name: auth-token
        secure: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: [ "health" ]

spring:
  datasource:
    url: "jdbc:sqlite:file:memdb?mode=memory&cache=shared"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL; PRAGMA foreign_keys=ON; PRAGMA busy_timeout=5000;"
  sql:
    init:
      mode: always
      schema-locations: classpath:instances-schema.sql