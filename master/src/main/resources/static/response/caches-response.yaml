components:
  schemas:
    CacheManagers:
      type: object
      properties:
        name:
          type: string
        caches:
          type: array
          items:
            $ref: '#/components/schemas/Caches'
    Caches:
      type: object
      properties:
        name:
          type: string
        target:
          type: string
    CachesResponse:
      type: object
      properties:
        cacheManagers:
          type: array
          items:
            $ref: '#/components/schemas/CacheManagers'
    CacheProfileResponse:
      type: object
      properties:
        name:
          type: string
        target:
          type: string
        cacheManager:
          type: string