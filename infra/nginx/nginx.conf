events {}

http {

    upstream website {
        server axelix-website:3000;
    }

    server {
        listen 80;
        server_name axelix.io;

        return 301 https://$host$request_uri;
    }

    server {

        listen 443 ssl;
        server_name axelix.io;

        ssl_certificate /etc/nginx/ssl/certificate.crt;
        ssl_certificate_key /etc/nginx/ssl/certificate.key;
        ssl_trusted_certificate /etc/nginx/ssl/certificate_ca.crt;

        # Website
        location / {
            proxy_pass http://website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Docs. The docs site is built with baseUrl '/docs/', so every route and
        # asset (including non-default locales at /docs/<locale>/...) lives under
        # /docs/. The trailing slash on proxy_pass strips the /docs/ prefix so the
        # container, which serves the build output at its root, resolves the path.
        # axelix-docs is supposed to resolve onto axelix-docs container within a docker network
        location /docs/ {
            proxy_pass http://axelix-docs:3000/;
            proxy_set_header Host $host;
        }

        # Blog
        location /blog {
            # axelix-docs is supposed to resolve onto axelix-docs container within a docker network
            proxy_pass http://axelix-blog:3000;
            proxy_set_header Host $host;
        }
    }
}