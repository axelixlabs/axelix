spring:
  application:
    name: 'axile-sbs-spring-test'
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include:
          - property-management
          - cache-dispatcher
          - profile-management
          - beans
          - env
          - spel-eval

logging:
  level:
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR

axile:
  sbs:
    spel:
      enabled: 'true'
      allowed-bean-names:
        - environment
        - systemProperties
        - nonExistingContextBean
        - spelEvaluationConfig
      allowed-class-names:
        - java.lang.Integer
        - java.lang.String
        - java.lang.reflect.Method
        - java.lang.invoke.MethodHandles